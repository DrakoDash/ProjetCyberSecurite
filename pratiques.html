<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Quiz Bonnes Pratiques - CyberQuiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
<style>
  :root{ --bg:#0a0f24; --card:#111833; --accent:#00bfff; --accent-2:#4cc9f0; --muted: rgba(255,255,255,0.75); --success: #7efc6a; }
  html,body{height:100%;margin:0;font-family:'Poppins',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden;}
  .navbar { position: fixed; top: 0; width: 100%; background: rgba(10,15,36,0.85); backdrop-filter: blur(6px); border-bottom: 2px solid var(--accent); padding: 12px 25px; display:flex; align-items:center; gap:12px; z-index:999; box-sizing: border-box;}
  .back-quiz { background: transparent; border: none; color: var(--accent); font-size:1rem; cursor:pointer; display:flex; align-items:center; gap:8px; }
  main { padding: 100px 20px 60px; max-width:900px; margin:0 auto; }
  .quiz-card { background: linear-gradient(180deg, rgba(17,24,51,0.95), rgba(13,19,43,0.85)); border: 1px solid rgba(0,191,255,0.12); border-radius: 14px; padding: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
  .quiz-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
  .progress { height:10px; background: rgba(255,255,255,0.06); border-radius:999px; overflow:hidden; flex:1; margin-left:16px; }
  .progress > i { display:block; height:100%; width:0%; background: linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .35s ease; }
  .question { font-size:1.15rem; margin: 18px 0; color:var(--muted); line-height:1.5; }
  .answers { display:flex; flex-direction:column; gap:12px; }
  .answer-btn { background: rgba(0,0,0,0.45); border:1px solid rgba(0,191,255,0.08); color:#fff; padding:12px 14px; border-radius:10px; text-align:left; cursor:pointer; transition: all .2s; }
  .answer-btn:hover { background: rgba(22,32,74,0.95); transform: translateX(5px); }
  .answer-btn.selected { background: var(--accent); color:#001; font-weight:600; }
  .controls { display:flex; gap:12px; margin-top:25px; }
  .btn { padding:12px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:600; transition: opacity 0.2s; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-primary { background:var(--accent); color:#001; flex:1; }
  .btn-ghost { background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--muted); }
  .correction-item { background: rgba(255,255,255,0.03); padding:15px; border-radius:10px; margin-bottom:12px; border-left: 4px solid var(--accent); }
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1200; }
  .modal { background: #0b1228; padding:25px; border-radius:15px; border:1px solid var(--accent); width:350px; text-align:center; }
</style>
</head>
<body>
<nav class="navbar"><button class="back-quiz" id="backBtn"><i class="fa-solid fa-arrow-left"></i> Retour</button><div style="font-weight:600; color:var(--accent)">CyberQuiz</div></nav>
<canvas id="particles" style="position:fixed;inset:0;z-index:-1;"></canvas>
<main>
  <div class="quiz-card">
    <div class="quiz-header"><h2 class="quiz-title" style="color:var(--accent);margin:0;font-size:1.3rem;">Bonnes Pratiques</h2><div class="progress"><i></i></div></div>
    <div id="quizStep">
      <div class="question" id="qText"></div>
      <div class="answers" id="ansBox"></div>
      <div class="controls">
        <button class="btn btn-ghost" id="pBtn" disabled>Précédent</button>
        <button class="btn btn-primary" id="nBtn" disabled>Suivant</button>
      </div>
    </div>
    <div id="resultStep" style="display:none; text-align:center;">
      <p>Votre score final :</p>
      <h2 id="finalScore" style="font-size:3rem; color:var(--accent); margin:10px 0;">0/15</h2>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="btn btn-primary" id="showCorr">Voir la correction détaillée</button>
        <button class="btn btn-ghost" onclick="location.href='index.html'">Retour à l'accueil</button>
      </div>
    </div>
    <div id="corrStep" style="display:none;">
      <h3 style="color:var(--accent)">Analyse de vos réponses</h3>
      <div id="corrList" style="max-height:450px; overflow-y:auto; padding-right:10px;"></div>
      <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="location.href='index.html'">Quitter le quiz</button>
    </div>
  </div>
</main>
<div id="cModal" style="display:none;"><div class="modal-backdrop"><div class="modal"><h4>Quitter maintenant ?</h4><p>Toute votre progression sera perdue.</p><div style="display:flex;gap:10px;"><button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('cModal').style.display='none'">Rester</button><button class="btn btn-primary" style="flex:1" onclick="location.href='index.html'">Quitter</button></div></div></div></div>
<script>
const questions = [
  { q:"Quelle est la méthode la plus sûre pour gérer vos nombreux mots de passe ?", a:["Utiliser le même mot de passe pour simplifier","Utiliser un mot de passe unique, long et complexe par compte","Les noter dans un carnet papier à côté de l'ordinateur"], c:1, e:"Un mot de passe unique par service évite qu'un seul piratage ne compromette tous vos comptes."},
  { q:"Avant de cliquer sur un lien reçu par message, quelle vérification est essentielle ?", a:["Cliquer pour voir si le site semble normal","Vérifier l'identité de l'expéditeur et survoler le lien pour voir l'URL réelle","Le partager avec vos amis pour avoir leur avis"], c:1, e:"Les fraudeurs imitent souvent l'apparence de sites officiels pour voler vos données."},
  { q:"Pourquoi est-il crucial d'installer les mises à jour de vos logiciels dès qu'elles sont proposées ?", a:["C'est principalement pour changer le design du logiciel","Elles servent à supprimer les fichiers trop anciens","Elles corrigent des failles de sécurité exploitées par les pirates"], c:2, e:"Les correctifs de sécurité sont votre première défense contre les virus récents."},
  { q:"Lorsque vous utilisez un Wi-Fi public (gare, café), quelle précaution devriez-vous prendre ?", a:["Entrer librement vos coordonnées bancaires","Utiliser un VPN pour chiffrer votre connexion","Ne rien faire de spécial, ces réseaux sont sécurisés par la ville"], c:1, e:"Un VPN crée un tunnel sécurisé qui empêche les autres utilisateurs du Wi-Fi d'espionner vos données."},
  { q:"Que faire si vous recevez un email suspect d'une administration demandant une action urgente ?", a:["Signaler l'email comme tentative de phishing","Répondre pour demander s'il s'agit d'une erreur","Cliquer sur la pièce jointe pour vérifier les détails"], c:0, e:"Les administrations ne demandent jamais d'informations sensibles ou de paiements urgents par simple email."},
  { q:"Pour protéger votre vie privée sur les réseaux sociaux, il est préférable de :", a:["Partager votre localisation en temps réel","Limiter la visibilité de vos infos aux personnes que vous connaissez réellement","Publier des photos de vos documents d'identité"], c:1, e:"Moins vous exposez de données personnelles, moins vous donnez d'indices aux pirates pour vous cibler."},
  { q:"Pourquoi est-il indispensable de verrouiller son écran (code, schéma) même pour une courte absence ?", a:["C'est uniquement pour faire joli sur l'écran d'accueil","Pour empêcher une personne physique d'accéder directement à vos données privées","Cela sert principalement à économiser la batterie du smartphone"], c:1, e:"Un accès physique à votre appareil est souvent la méthode la plus rapide pour voler vos informations."},
  { q:"Quel est le meilleur réflexe à avoir si vous avez un doute sur la sécurité d'une application ?", a:["Demander conseil à un expert ou faire une recherche en ligne","L'ignorer et continuer à l'utiliser normalement","La télécharger quand même pour tester ses fonctionnalités"], c:0, e:"La prudence est la règle d'or : en cas de doute, on ne télécharge pas."},
  { q:"À quoi servent principalement les sauvegardes régulières de vos données ?", a:["À encombrer inutilement vos disques durs","À pouvoir récupérer vos fichiers en cas de panne, vol ou cyberattaque","À supprimer automatiquement les fichiers les plus anciens"], c:1, e:"La sauvegarde est votre seule garantie de ne pas tout perdre en cas de problème technique majeur."},
  { q:"Pour installer une nouvelle application sur votre mobile, vous devriez :", a:["Prendre n'importe quel lien trouvé sur un blog","Utiliser exclusivement les stores officiels (Play Store, App Store)","Désactiver toutes les protections pour faciliter l'installation"], c:1, e:"Les stores officiels scannent les applications pour s'assurer qu'elles ne contiennent pas de malwares cachés."},
  { q:"Comment réagir face à une fenêtre surgissante (pop-up) indiquant que votre PC est infecté ?", a:["Cliquer sur le bouton proposé pour nettoyer le PC","Fermer immédiatement la fenêtre sans rien télécharger","Donner ses informations pour recevoir une aide à distance"], c:1, e:"Ces fenêtres sont presque toujours des pièges pour vous faire installer de vrais virus."},
  { q:"Quel est le rôle principal d'un gestionnaire de mots de passe ?", a:["Mémoriser tous vos codes à votre place","Créer, stocker et remplir automatiquement des mots de passe très complexes","Permettre de partager facilement ses codes avec des collègues"], c:1, e:"Il vous permet d'avoir 100 mots de passe différents sans avoir besoin de les retenir de tête."},
  { q:"Quand devriez-vous changer le mot de passe d'un compte important ?", a:["Seulement une fois par an","Dès que vous soupçonnez une fuite de données ou un accès suspect","Il ne faut jamais le changer pour ne pas l'oublier"], c:1, e:"Réagir vite après une faille de sécurité permet de bloquer l'accès aux attaquants."},
  { q:"Au travail, quel est le bon comportement vis-à-vis de votre session informatique ?", a:["Laisser son poste ouvert pour que les collègues puissent aider","Verrouiller systématiquement sa session dès que l'on quitte son bureau","Partager ses identifiants avec son binôme pour plus d'efficacité"], c:1, e:"Votre identité numérique au travail engage votre responsabilité professionnelle."},
  { q:"Si vous trouvez une clé USB inconnue sur un parking, que faites-vous ?", a:["La brancher sur votre ordinateur pour voir ce qu'il y a dedans","La faire analyser par le service informatique (IT) ou ne pas l'utiliser","La jeter directement à la poubelle sans réfléchir"], c:1, e:"Une clé USB 'perdue' est une technique classique pour infiltrer un malware dans un réseau."}
];
let cur = 0; let userAns = new Array(questions.length).fill(null);
const qT = document.getElementById('qText'); const aB = document.getElementById('ansBox'); const nB = document.getElementById('nBtn'); const pB = document.getElementById('pBtn'); const pI = document.querySelector('.progress i');
function showQ() {
  const q = questions[cur]; qT.innerHTML = `<strong>Question ${cur+1}:</strong> ${q.q}`; aB.innerHTML = '';
  nB.disabled = userAns[cur] === null; pB.disabled = cur === 0; nB.textContent = cur === questions.length-1 ? "Terminer" : "Suivant";
  q.a.forEach((ans, i) => {
    const b = document.createElement('button'); b.className = 'answer-btn' + (userAns[cur]===i?' selected':''); b.textContent = ans;
    b.onclick = () => { document.querySelectorAll('.answer-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); userAns[cur]=i; nB.disabled=false; };
    aB.appendChild(b);
  });
  pI.style.width = (cur / questions.length * 100) + '%';
}
nB.onclick = () => { if(cur < questions.length-1) { cur++; showQ(); } else { endQuiz(); } };
pB.onclick = () => { cur--; showQ(); };
function endQuiz() { 
  document.getElementById('quizStep').style.display='none'; document.getElementById('resultStep').style.display='block'; pI.style.width='100%';
  let s = 0; userAns.forEach((a,i) => { if(a===questions[i].c) s++; });
  document.getElementById('finalScore').textContent = `${s} / ${questions.length}`;
}
document.getElementById('showCorr').onclick = () => {
  document.getElementById('resultStep').style.display='none'; document.getElementById('corrStep').style.display='block';
  const list = document.getElementById('corrList'); list.innerHTML = '';
  questions.forEach((q,i) => {
    const ok = userAns[i]===q.c;
    list.innerHTML += `<div class="correction-item"><p style="margin-top:0"><strong>${i+1}. ${q.q}</strong></p>
    <p>Réponse : <span style="color:${ok? 'var(--success)':'#ff7b7b'}">${q.a[userAns[i]]}</span> ${ok?'':'<br>Bonne réponse : <b>'+q.a[q.c]+'</b>'}</p>
    <p style="font-size:0.9rem; color:var(--muted); font-style:italic">${q.e}</p></div>`;
  });
};
document.getElementById('backBtn').onclick = () => document.getElementById('cModal').style.display='block';
showQ();
</script>
</body>
</html>
