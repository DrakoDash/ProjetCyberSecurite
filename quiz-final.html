<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contrôle Final - Quiz Cybersécurité</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
<style>
body { margin:0; font-family:Poppins,sans-serif; background:#0a0f24; color:white; }
.quiz-container { max-width:700px; margin:40px auto; background:#111833; padding:30px; border-radius:14px; box-shadow:0 5px 20px rgba(0,0,0,0.5);}
.question { font-size:1.4rem; margin-bottom:20px;}
.btn-answer { display:block; width:100%; padding:12px; margin:10px 0; background:#16204a; border:none; border-radius:10px; cursor:pointer; color:white; }
.btn-answer:hover { background:#1f2a66; }
#feedback { margin-top:20px; font-size:1.2rem; font-weight:600; }
</style>
</head>
<body>

<div class="quiz-container">
  <h2 style="text-align:center; color:#5b82ff;">Contrôle Final — Question Aléatoire</h2>

  <div id="question" class="question"></div>
  <div id="answers"></div>

  <button id="validate-btn" class="btn-answer" style="background:#3f6cf3;">Valider</button>

  <div id="feedback"></div>
</div>

<script>
// Questions difficiles
const questions = [
  {
    texte: "Quel est l’indicateur le PLUS fiable pour détecter un mail de phishing sophistiqué ?",
    choix: [
      "Une faute d’orthographe dans le texte",
      "L’adresse réelle du lien après survol",
      "Un logo légèrement flou",
      "Un ton urgent dans le message"
    ],
    correct: 1
  },
  {
    texte: "Quel type d’attaque exploite une faille dans un site web pour injecter du code malveillant ?",
    choix: ["Brute force", "XSS", "DDoS", "ARP Spoofing"],
    correct: 1
  },
  {
    texte: "Quel protocole garantit la confidentialité des données lors d’une navigation web ?",
    choix: ["HTTP", "FTP", "HTTPS", "DNS"],
    correct: 2
  },
  {
    texte: "Quel comportement est le PLUS dangereux en entreprise ?",
    choix: [
      "Utiliser un VPN public",
      "Partager son mot de passe avec un collègue",
      "Ouvrir un mail inconnu",
      "Ne pas verrouiller son poste"
    ],
    correct: 1
  },
  {
    texte: "Quel est le rôle principal d’un pare-feu ?",
    choix: [
      "Crypter les données",
      "Bloquer les connexions non autorisées",
      "Supprimer les virus",
      "Accélérer la connexion internet"
    ],
    correct: 1
  },
  {
    texte: "Quel type de malware chiffre vos fichiers pour demander une rançon ?",
    choix: ["Spyware", "Trojan", "Ransomware", "Rootkit"],
    correct: 2
  },
  {
    texte: "Quelle est la meilleure pratique pour créer un mot de passe robuste ?",
    choix: [
      "Utiliser des informations personnelles",
      "Utiliser un gestionnaire de mots de passe",
      "Utiliser le même mot de passe partout",
      "Utiliser un mot simple mais long"
    ],
    correct: 1
  },
  {
    texte: "Quel outil permet d’analyser le trafic réseau pour détecter des anomalies ?",
    choix: ["Wireshark", "Photoshop", "Excel", "Discord"],
    correct: 0
  },
  {
    texte: "Quel est le principal risque d’un réseau Wi-Fi public non sécurisé ?",
    choix: [
      "Perte de batterie",
      "Interception des données",
      "Ralentissement de la connexion",
      "Blocage des applications"
    ],
    correct: 1
  },
  {
    texte: "Quel est le meilleur moyen de se protéger contre les attaques par force brute ?",
    choix: [
      "Utiliser un mot de passe court mais complexe",
      "Limiter le nombre de tentatives de connexion",
      "Changer de navigateur",
      "Désactiver le pare-feu"
    ],
    correct: 1
  }
];

// Tirage aléatoire
let q = questions[Math.floor(Math.random() * questions.length)];

document.getElementById("question").textContent = q.texte;

let html = "";
q.choix.forEach((c, i) => {
  html += `<button class="btn-answer" onclick="selectAnswer(${i})" id="btn${i}">${c}</button>`;
});
document.getElementById("answers").innerHTML = html;

let selected = null;

function selectAnswer(i) {
  selected = i;
  q.choix.forEach((_, idx) => {
    document.getElementById("btn" + idx).style.background = "#16204a";
  });
  document.getElementById("btn" + i).style.background = "#3f6cf3";
}

document.getElementById("validate-btn").onclick = () => {
  if (selected === null) {
    document.getElementById("feedback").textContent = "Veuillez choisir une réponse.";
    return;
  }

  if (selected === q.correct) {
    document.getElementById("feedback").textContent = "Bonne réponse ! Vous maîtrisez ce sujet.";
    document.getElementById("feedback").style.color = "#4caf50";
  } else {
    document.getElementById("feedback").textContent =
      "Mauvaise réponse. La bonne réponse était : " + q.choix[q.correct];
    document.getElementById("feedback").style.color = "#ff5252";
  }
};
</script>

</body>
</html>
