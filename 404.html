<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Erreur 404 - CyberQuiz</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0f24;
  --accent:#00bfff;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:white;
  overflow:hidden;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(10,15,36,0.85);
  backdrop-filter: blur(6px);
  border-bottom: 2px solid var(--accent);
  padding: 12px 25px;
  display: flex;
  justify-content: space-between;
}

.nav-logo {
  font-weight:600;
  color:var(--accent);
}

/* FLASH écran */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  animation:flashAnim 0.4s ease;
}

@keyframes flashAnim{
  0%{opacity:1;}
  100%{opacity:0;}
}

/* CONTENU */
.error-container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  opacity:0;
  transform:translateY(40px) scale(0.95);
  animation:appear 0.8s ease forwards;
  animation-delay:0.3s;
}

@keyframes appear{
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

/* GLITCH */
.glitch{
  font-size:2.8rem;
  font-weight:800;
  position:relative;
}

.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  width:100%;
}

.glitch::before{
  color:red;
  animation:glitch 0.4s infinite;
}

.glitch::after{
  color:cyan;
  animation:glitch 0.4s infinite reverse;
}

@keyframes glitch{
  0%{transform:translate(0)}
  20%{transform:translate(-2px,2px)}
  40%{transform:translate(-2px,-2px)}
  60%{transform:translate(2px,2px)}
  80%{transform:translate(2px,-2px)}
  100%{transform:translate(0)}
}

/* Icône */
.error-icon{
  font-size:60px;
  color:#ff3b3b;
  margin-bottom:15px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  50%{transform:scale(1.2);}
}

/* Barre */
.error-bar{
  width:300px;
  height:4px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  margin:20px auto;
  animation:slide 2s infinite;
}

@keyframes slide{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

.error-text{
  opacity:0.85;
  margin-bottom:30px;
}

/* Bouton */
.btn{
  background:#ffe600;
  color:black;
  padding:12px 30px;
  font-weight:600;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08);
}

/* Particules */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<div class="flash"></div>

<nav class="navbar">
  <div class="nav-logo">CyberQuiz</div>
</nav>

<canvas id="particles"></canvas>

<div class="error-container">

  <div class="error-icon">
    <i class="fa-solid fa-triangle-exclamation"></i>
  </div>

  <div class="glitch" data-text="ERREUR 404">
    ERREUR 404
  </div>

  <div class="error-bar"></div>

  <div class="error-text">
    La page est introuvable ou corrompue.
  </div>

  <button class="btn" onclick="location.href='accueil.html'">
    CONTINUER
  </button>

</div>

<!-- SON -->
<audio id="errorSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
/* Son au chargement */
window.addEventListener("load", () => {
  const sound = document.getElementById("errorSound");
  sound.volume = 0.4;

  // contourne les restrictions navigateur
  setTimeout(() => {
    sound.play().catch(()=>{});
  }, 200);
});

/* Particules */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particlesArray = [];

function initCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

class Particle{
  constructor(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=Math.random()*2+1;
    this.speedX=(Math.random()-0.5)*0.5;
    this.speedY=(Math.random()-0.5)*0.5;
  }
  update(){
    this.x+=this.speedX;
    this.y+=this.speedY;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle="rgba(0,191,255,0.5)";
    ctx.fill();
  }
}

function initParticles(){
  particlesArray=[];
  for(let i=0;i<80;i++){
    particlesArray.push(new Particle());
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}

initCanvas();
initParticles();
animate();

window.addEventListener('resize', initCanvas);
</script>

</body>
</html>
