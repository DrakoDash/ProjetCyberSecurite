<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Erreur 404 - CyberQuiz</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0f24;
  --accent:#00bfff;
  --accent-2:#4cc9f0;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:white;
  overflow:hidden;
}

/* NAVBAR (identique à ton site) */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(10,15,36,0.85);
  backdrop-filter: blur(6px);
  border-bottom: 2px solid var(--accent);
  padding: 12px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-logo {
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--accent);
}

.nav-links a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* CONTENU ERREUR */
.error-container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* Icône */
.error-icon{
  font-size:60px;
  color:#ff3b3b;
  margin-bottom:15px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* Texte principal */
.error-title{
  font-size:2.8rem;
  font-weight:800;
  letter-spacing:2px;
  margin-bottom:10px;
}

/* Ligne style Fortnite */
.error-bar{
  width:300px;
  height:4px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  margin:20px auto;
  animation: slide 2s infinite;
}

@keyframes slide{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

/* Texte secondaire */
.error-text{
  opacity:0.85;
  margin-bottom:30px;
}

/* Bouton */
.btn{
  background:#ffe600;
  color:black;
  padding:12px 30px;
  font-weight:600;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08);
}

/* Code erreur */
.code{
  margin-top:15px;
  font-size:0.9rem;
  opacity:0.6;
}

/* Particules (repris de ton site) */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-logo">CyberQuiz</div>
  <div class="nav-links">
    <a href="accueil.html">Accueil</a>
  </div>
</nav>

<canvas id="particles"></canvas>

<div class="error-container">

  <div class="error-icon">
    <i class="fa-solid fa-triangle-exclamation"></i>
  </div>

  <div class="error-title">
    NOUS AVONS RENCONTRÉ UNE ERREUR
  </div>

  <div class="error-bar"></div>

  <div class="error-text">
    La page que vous cherchez n'existe pas ou a été déplacée.<br>
    Erreur 404 — Page introuvable.
  </div>

  <button class="btn" onclick="location.href='accueil.html'">
    RETOUR À L'ACCUEIL
  </button>

  <div class="code">
    cyberquiz.error.404.notfound
  </div>

</div>

<script>
/* Particules (identique à ton site) */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particlesArray = [];

function initCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener('resize',()=>{
  initCanvas();
  initParticles();
});

class Particle{
  constructor(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=Math.random()*2+1;
    this.speedX=(Math.random()-0.5)*0.5;
    this.speedY=(Math.random()-0.5)*0.5;
  }
  update(){
    this.x+=this.speedX;
    this.y+=this.speedY;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle="rgba(0,191,255,0.5)";
    ctx.fill();
  }
}

function initParticles(){
  particlesArray=[];
  for(let i=0;i<80;i++){
    particlesArray.push(new Particle());
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}

initCanvas();
initParticles();
animate();
</script>

</body>
</html>
