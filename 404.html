<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erreur 404 — CyberQuiz</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">

<style>
    body {
        margin: 0;
        background: #0a0f24;
        font-family: 'Poppins', sans-serif;
        color: white;
        overflow: hidden;
        text-align: center;
    }

    /* Particules */
    #particles {
        position: fixed;
        inset: 0;
        z-index: -1;
    }

    /* Boîte d'erreur façon Fortnite */
    .error-box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.55);
        padding: 30px 40px;
        border-radius: 12px;
        width: 90%;
        max-width: 480px;
        border: 2px solid #00bfff;
        box-shadow: 0 0 20px rgba(0,191,255,0.4);
        animation: popIn 0.5s ease forwards, shake 0.35s ease 0.5s;
    }

    /* Apparition */
    @keyframes popIn {
        0% { transform: translate(-50%, -60%) scale(0.85); opacity: 0; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* Vibration Fortnite */
    @keyframes shake {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        25% { transform: translate(calc(-50% - 3px), calc(-50% + 2px)) rotate(-1deg); }
        50% { transform: translate(calc(-50% + 3px), calc(-50% - 2px)) rotate(1deg); }
        75% { transform: translate(calc(-50% - 2px), calc(-50% + 1px)) rotate(-1deg); }
        100% { transform: translate(-50%, -50%) rotate(0deg); }
    }

    /* Titre */
    h1 {
        font-size: 1.6rem;
        margin-bottom: 10px;
        color: #00bfff;
        text-shadow: 0 0 12px #00bfff;
    }

    /* Texte */
    p {
        opacity: 0.9;
        margin-bottom: 25px;
        font-size: 1rem;
        line-height: 1.4;
    }

    /* Bouton Fortnite */
    .btn {
        padding: 12px 25px;
        background: #00bfff;
        border: none;
        color: black;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.25s;
        font-size: 1.1rem;
        width: 100%;
        max-width: 260px;
    }

    .btn:hover {
        background: #4cc9f0;
        box-shadow: 0 0 15px #00bfff;
    }
</style>
</head>

<body>

<!-- Son d'erreur discret -->
<audio id="errorSound" autoplay>
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-system-beep-buzzer-fail-2964.mp3" type="audio/mpeg">
</audio>

<!-- Particules -->
<canvas id="particles"></canvas>

<!-- Boîte d'erreur style Fortnite -->
<div class="error-box">
    <h1>NOUS AVONS BUTÉ SUR UN OBSTACLE</h1>

    <p>Le serveur n’a pas trouvé la page demandée.<br>
    <strong>Erreur 404</strong></p>

    <button class="btn" onclick="window.location.href='accueil.html'">CONTINUER</button>
</div>

<script>
/* Particules */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particlesArray = [];

function initCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener('resize', () => {
    initCanvas();
    initParticles();
});

class Particle {
    constructor() {
        this.reset();
        this.size = Math.random() * 2.5 + 0.6;
        this.color = `rgba(0,191,255,${Math.random() * 0.45 + 0.15})`;
    }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.speedX = (Math.random() - 0.5) * 0.6;
        this.speedY = (Math.random() - 0.5) * 0.6;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < -10 || this.x > canvas.width + 10 || this.y < -10 || this.y > canvas.height + 10) {
            this.reset();
        }
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

function initParticles() {
    particlesArray = [];
    const number = Math.max(40, Math.floor((canvas.width * canvas.height) / 16000));
    for (let i = 0; i < number; i++) particlesArray.push(new Particle());
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particlesArray.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
}

initCanvas();
initParticles();
animateParticles();
</script>

</body>
</html>
