<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Identifier les Menaces - CyberQuiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
<style>
  :root{ --bg:#0a0f24; --card:#111833; --accent:#00bfff; --accent-2:#4cc9f0; --muted: rgba(255,255,255,0.75); --success: #7efc6a; }
  html,body{height:100%;margin:0;font-family:'Poppins',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden;}
  .navbar { position: fixed; top: 0; width: 100%; background: rgba(10,15,36,0.85); backdrop-filter: blur(6px); border-bottom: 2px solid var(--accent); padding: 12px 25px; display:flex; align-items:center; gap:12px; z-index:999; box-sizing: border-box;}
  .back-quiz { background: transparent; border: none; color: var(--accent); font-size:1rem; cursor:pointer; display:flex; align-items:center; gap:8px; }
  main { padding: 100px 20px 60px; max-width:900px; margin:0 auto; }
  .quiz-card { background: linear-gradient(180deg, rgba(17,24,51,0.95), rgba(13,19,43,0.85)); border: 1px solid rgba(0,191,255,0.12); border-radius: 14px; padding: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
  .quiz-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
  .progress { height:10px; background: rgba(255,255,255,0.06); border-radius:999px; overflow:hidden; flex:1; margin-left:16px; }
  .progress > i { display:block; height:100%; width:0%; background: linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .35s ease; }
  .question { font-size:1.15rem; margin: 18px 0; color:var(--muted); line-height:1.5; }
  .answers { display:flex; flex-direction:column; gap:12px; }
  .answer-btn { background: rgba(0,0,0,0.45); border:1px solid rgba(0,191,255,0.08); color:#fff; padding:12px 14px; border-radius:10px; text-align:left; cursor:pointer; transition: all .2s; }
  .answer-btn:hover { background: rgba(22,32,74,0.95); transform: translateX(5px); }
  .answer-btn.selected { background: var(--accent); color:#001; font-weight:600; }
  .controls { display:flex; gap:12px; margin-top:25px; }
  .btn { padding:12px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:600; transition: opacity 0.2s; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-primary { background:var(--accent); color:#001; flex:1; }
  .btn-ghost { background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--muted); }
  .correction-item { background: rgba(255,255,255,0.03); padding:15px; border-radius:10px; margin-bottom:12px; border-left: 4px solid var(--accent); }
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1200; }
  .modal { background: #0b1228; padding:25px; border-radius:15px; border:1px solid var(--accent); width:350px; text-align:center; }
</style>
</head>
<body>
<nav class="navbar"><button class="back-quiz" id="backBtn"><i class="fa-solid fa-arrow-left"></i> Retour</button><div style="font-weight:600; color:var(--accent)">CyberQuiz</div></nav>
<canvas id="particles" style="position:fixed;inset:0;z-index:-1;"></canvas>
<main>
  <div class="quiz-card">
    <div class="quiz-header"><h2 class="quiz-title" style="color:var(--accent);margin:0;font-size:1.3rem;">Bonnes Pratiques</h2><div class="progress"><i></i></div></div>
    <div id="quizStep">
      <div class="question" id="qText"></div>
      <div class="answers" id="ansBox"></div>
      <div class="controls">
        <button class="btn btn-ghost" id="pBtn" disabled>Précédent</button>
        <button class="btn btn-primary" id="nBtn" disabled>Suivant</button>
      </div>
    </div>
    <div id="resultStep" style="display:none; text-align:center;">
      <p>Votre score final :</p>
      <h2 id="finalScore" style="font-size:3rem; color:var(--accent); margin:10px 0;">0/15</h2>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="btn btn-primary" id="showCorr">Voir la correction détaillée</button>
        <button class="btn btn-ghost" onclick="location.href='accueil.html'">Retour à l'accueil</button>
      </div>
    </div>
    <div id="corrStep" style="display:none;">
      <h3 style="color:var(--accent)">Analyse de vos réponses</h3>
      <div id="corrList" style="max-height:450px; overflow-y:auto; padding-right:10px;"></div>
      <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="location.href='accueil.html'">Quitter le quiz</button>
    </div>
  </div>
</main>
<div id="cModal" style="display:none;"><div class="modal-backdrop"><div class="modal"><h4>Quitter maintenant ?</h4><p>Toute votre progression sera perdue.</p><div style="display:flex;gap:10px;"><button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('cModal').style.display='none'">Rester</button><button class="btn btn-primary" style="flex:1" onclick="location.href='index.html'">Quitter</button></div></div></div></div>
<script>
const questions = [
  {q:"Vous recevez un email très urgent de 'votre banque' demandant de confirmer vos codes sous peine de blocage. Que faites-vous ?", a:["Je réponds immédiatement pour ne pas être bloqué","Je vérifie l'adresse de l'expéditeur et je contacte ma banque via l'application officielle","Je clique sur le lien pour voir s'il s'agit bien de ma banque"], c:1, e:"C'est une attaque de phishing. Les banques ne demandent jamais de codes par email."},
  {q:"Que signifie l'absence de 'HTTPS' et du cadenas dans la barre d'adresse d'un site ?", a:["Le site est plus rapide car non chiffré","Les données échangées ne sont pas protégées et peuvent être interceptées","Le site est certifié conforme par le navigateur"], c:1, e:"Sans HTTPS, vos mots de passe ou numéros de carte circulent en clair sur le réseau."},
  {q:"Un ami vous envoie un lien étrange sur Messenger sans explication. Quel est votre réflexe ?", a:["Je clique par curiosité car c'est mon ami","Je lui demande d'abord s'il a vraiment envoyé ce lien car son compte est peut-être piraté","Je partage le lien avec mes autres amis"], c:1, e:"Le piratage de compte permet d'envoyer des virus à tous les contacts de la victime."},
  {q:"Quel est le levier principal utilisé par les attaquants lors d'un 'Phishing' ?", a:["La création d'un sentiment d'urgence ou de stress","La distribution de cadeaux gratuits sans conditions","L'envoi de longs textes techniques incompréhensibles"], c:0, e:"Le stress pousse l'utilisateur à agir sans réfléchir, c'est la base de l'ingénierie sociale."},
  {q:"Vous trouvez un film gratuit à télécharger sur un site inconnu au format '.exe'. Est-ce risqué ?", a:["Non, c'est simplement un format vidéo spécial","Oui, c'est très probablement un malware (virus) déguisé en film","C'est une méthode de téléchargement plus rapide"], c:1, e:"Un fichier .exe est un programme exécutable. Un film devrait être en .mp4 ou .mkv."},
  {q:"Vous recevez un message : 'Félicitations ! Vous avez gagné un iPhone 15, cliquez ici'. Qu'en pensez-vous ?", a:["C'est une offre promotionnelle fiable","C'est une arnaque classique pour voler vos données ou vous abonner à un service payant","C'est tout à fait normal sur Internet"], c:1, e:"Sur le web, si c'est trop beau pour être vrai, c'est que c'est une arnaque."},
  {q:"Une clé USB est posée sur votre bureau. Vous ne savez pas à qui elle appartient. Que faites-vous ?", a:["Je la branche pour identifier son propriétaire","Je la donne au service informatique sans la brancher","Je l'utilise pour mes sauvegardes personnelles"], c:1, e:"Brancher une clé inconnue est un risque majeur d'infection immédiate de votre ordinateur."},
  {q:"Quelle est la dangerosité d'un SMS (Smishing) provenant soi-disant de votre banque ou d'un service de livraison ?", a:["Aucune, les SMS sont 100% sécurisés","Le lien peut vous diriger vers un faux site pour voler vos coordonnées bancaires","C'est juste de la publicité"], c:1, e:"Le Smishing est le phishing par SMS, de plus en plus fréquent et dangereux."},
  {q:"Pourquoi l'utilisation d'un Wi-Fi public sans protection est-elle déconseillée pour vos achats ?", a:["Parce que la connexion est trop lente pour payer","Parce qu'un pirate peut intercepter vos numéros de carte bancaire sur le réseau","Parce que le site de la banque refusera la connexion"], c:1, e:"Sur un réseau non sécurisé, vos données circulent dans l'air et peuvent être 'écoutées' par des pirates."},
  {q:"À quoi sert une mise à jour de sécurité sur votre ordinateur ou smartphone ?", a:["À changer les couleurs de l'interface","À corriger des failles qui permettent aux virus d'entrer","À ralentir volontairement les anciens modèles"], c:1, e:"Les mises à jour sont des 'pansements' pour réparer les trous de sécurité de vos logiciels."},
  {q:"Un écran surgit soudainement : 'VOTRE ORDINATEUR EST BLOQUÉ. PAYEZ 300€'. De quoi s'agit-il ?", a:["D'une amende officielle de la police","D'un Ransomware (rançongiciel) qui a chiffré vos fichiers","D'une simple publicité pour un antivirus"], c:1, e:"Le ransomware bloque vos données et exige de l'argent. La seule solution est souvent la restauration de sauvegardes."},
  {q:"Comment reconnaître un lien frauduleux dans un email ?", a:["L'URL affichée ne correspond pas au site officiel quand on passe la souris dessus","Le lien est écrit en gras et en rouge","Le lien est trop court"], c:0, e:"Vérifiez toujours la destination réelle du lien avant de cliquer."},
  {q:"Sur un site de vente d'occasion, l'acheteur vous demande une photo de votre carte bancaire. Que faites-vous ?", a:["Je lui envoie pour prouver mon identité","Je refuse catégoriquement et je signale l'utilisateur car c'est une tentative de fraude","Je cache juste le cryptogramme visuel"], c:1, e:"Personne n'a jamais besoin d'une photo de votre carte pour vous faire un paiement."},
  {q:"Qu'est-ce que l'usurpation d'identité numérique ?", a:["Utiliser le nom de quelqu'un d'autre sur un forum","Se faire passer pour vous en utilisant vos données personnelles volées","Changer de photo de profil"], c:1, e:"Les données volées permettent aux fraudeurs de contracter des crédits ou de commettre des délits en votre nom."},
  {q:"Pourquoi est-il vital d'avoir un antivirus à jour ?", a:["C'est une obligation légale sur Internet","Pour détecter et bloquer les menaces avant qu'elles n'endommagent le système","C'est principalement pour décorer le bureau"], c:1, e:"L'antivirus est votre bouclier contre les attaques connues et les comportements suspects."}
];
let cur = 0; let userAns = new Array(questions.length).fill(null);
const qT = document.getElementById('qText'); const aB = document.getElementById('ansBox'); const nB = document.getElementById('nBtn'); const pB = document.getElementById('pBtn'); const pI = document.querySelector('.progress i');
function showQ() {
  const q = questions[cur]; qT.innerHTML = `<strong>Question ${cur+1}:</strong> ${q.q}`; aB.innerHTML = '';
  nB.disabled = userAns[cur] === null; pB.disabled = cur === 0; nB.textContent = cur === questions.length-1 ? "Terminer" : "Suivant";
  q.a.forEach((ans, i) => {
    const b = document.createElement('button'); b.className = 'answer-btn' + (userAns[cur]===i?' selected':''); b.textContent = ans;
    b.onclick = () => { document.querySelectorAll('.answer-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); userAns[cur]=i; nB.disabled=false; };
    aB.appendChild(b);
  });
  pI.style.width = (cur / questions.length * 100) + '%';
}
nB.onclick = () => { if(cur < questions.length-1) { cur++; showQ(); } else { endQuiz(); } };
pB.onclick = () => { cur--; showQ(); };
function endQuiz() { 
  document.getElementById('quizStep').style.display='none'; document.getElementById('resultStep').style.display='block'; pI.style.width='100%';
  let s = 0; userAns.forEach((a,i) => { if(a===questions[i].c) s++; });
  document.getElementById('finalScore').textContent = `${s} / ${questions.length}`;
}
document.getElementById('showCorr').onclick = () => {
  document.getElementById('resultStep').style.display='none'; document.getElementById('corrStep').style.display='block';
  const list = document.getElementById('corrList'); list.innerHTML = '';
  questions.forEach((q,i) => {
    const ok = userAns[i]===q.c;
    list.innerHTML += `<div class="correction-item"><p style="margin-top:0"><strong>${i+1}. ${q.q}</strong></p>
    <p>Réponse : <span style="color:${ok? 'var(--success)':'#ff7b7b'}">${q.a[userAns[i]]}</span> ${ok?'':'<br>Bonne réponse : <b>'+q.a[q.c]+'</b>'}</p>
    <p style="font-size:0.9rem; color:var(--muted); font-style:italic">${q.e}</p></div>`;
  });
};
document.getElementById('backBtn').onclick = () => document.getElementById('cModal').style.display='block';
showQ();
</script>
</body>
</html>
