<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Cybersécurité - Menaces</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Poppins, sans-serif;
    background: #0a0f24;
    color: white;
}

.quiz-container {
    max-width: 700px;
    margin: 40px auto;
    background: #111833;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

.question {
    font-size: 1.4rem;
    margin-bottom: 20px;
}

#progress {
    margin-bottom: 15px;
    opacity: 0.8;
}

.btn-answer {
    display: block;
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #16204a;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    transition: background 0.3s, transform 0.2s;
}

.btn-answer:hover { 
    background: #1f2a66; 
    transform: scale(1.03);
}
.btn-answer.selected { 
    background: #3f6cf3; 
    transform: scale(1.05);
}

#nav-container {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

#nav-container button {
    padding: 12px 20px;
    background: #3f6cf3;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.3s;
}

#nav-container button:hover { background: #5b82ff; }
#nav-container button:disabled { background: #444d77; cursor: not-allowed; }

#results {
    margin-top: 20px;
    background: #0d1330;
    padding: 20px;
    border-radius: 10px;
    display: none;
}

.result-item {
    background: #1c2347;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.btn-top {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.action-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #3f6cf3;
    cursor: pointer;
    color: white;
    transition: background 0.3s;
}

.action-btn:hover { background: #5b82ff; }

@media (max-width: 480px) {
    .btn-answer { font-size: 1rem; padding: 10px; }
    #nav-container button, .action-btn { font-size: 0.9rem; padding: 10px; }
}
</style>
</head>

<body>

<div class="quiz-container">
    <div id="progress"></div>
    <div id="question" class="question"></div>
    <div id="answers"></div>

    <div id="nav-container">
        <button id="prev-btn">Précédent</button>
        <button id="next-btn">Suivant</button>
        <button id="finish-btn">Terminer</button>
    </div>

    <div id="results"></div>
</div>

<script>
const questions = [
{q:"Email urgent demandant tes infos ?",a:["Répondre","Vérifier expéditeur","Cliquer"],c:1,e:"Toujours vérifier la source."},
{q:"Site sans HTTPS ?",a:["Sûr","Dangereux","Normal"],c:1,e:"Pas sécurisé."},
{q:"Lien étrange d’un ami ?",a:["Cliquer","Vérifier","Partager"],c:1,e:"Compte peut être piraté."},
{q:"Phishing ?",a:["Urgence","Message drôle","Long texte"],c:0,e:"Manipulation par stress."},
{q:"Téléchargement inconnu ?",a:["Sûr","Virus possible","Rapide"],c:1,e:"Risque malware."},
{q:"Cadeau gratuit ?",a:["Fiable","Arnaque","Normal"],c:1,e:"Trop beau = suspect."},
{q:"Clé USB trouvée ?",a:["Brancher","Donner IT","Garder"],c:1,e:"Danger malware."},
{q:"Fichier .exe ?",a:["Sans risque","Dangereux","Obligatoire"],c:1,e:"Peut installer virus."},
{q:"SMS banque ?",a:["Cliquer","Supprimer","Répondre"],c:1,e:"Phishing courant."},
{q:"Wi-Fi public ?",a:["Sûr","Risque","Ultra sûr"],c:1,e:"Interception possible."},
{q:"Mot de passe ?",a:["123456","Complexe","Identique"],c:1,e:"Complexité importante."},
{q:"Mise à jour ?",a:["Inutile","Sécurité","Ralentit"],c:1,e:"Corrige failles."},
{q:"Carte bancaire demandée ?",a:["Donner","Quitter","Envoyer photo"],c:1,e:"Arnaque probable."},
{q:"Pop-up étrange ?",a:["Normal","Virus","Ignorer"],c:1,e:"Signe infection."},
{q:"Antivirus ?",a:["Inutile","Protège","Décoratif"],c:1,e:"Protection essentielle."}
];

let index = 0;
let userAnswers = Array(questions.length).fill(null);

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const progressEl = document.getElementById("progress");
const prevBtn = document.getElementById("prev-btn");
const nextBtn = document.getElementById("next-btn");
const finishBtn = document.getElementById("finish-btn");
const resultsEl = document.getElementById("results");

function loadQuestion(){
    const q = questions[index];
    progressEl.textContent = `Question ${index+1} / ${questions.length}`;
    questionEl.textContent = q.q;
    answersEl.innerHTML = "";

    q.a.forEach((ans,i)=>{
        const btn = document.createElement("button");
        btn.className = "btn-answer";
        btn.textContent = ans;
        btn.setAttribute("tabindex","0");

        if(userAnswers[index]===i) btn.classList.add("selected");

        btn.onclick = () => { userAnswers[index]=i; loadQuestion(); };
        btn.onkeypress = (e) => { if(e.key==="Enter" || e.key===" ") btn.click(); };

        answersEl.appendChild(btn);
    });

    prevBtn.style.display = index===0?"none":"inline-block";
    nextBtn.style.display = index===questions.length-1?"none":"inline-block";
    finishBtn.style.display = index===questions.length-1?"inline-block":"none";

    nextBtn.disabled = userAnswers[index]===null;
}

prevBtn.onclick = ()=>{index--; loadQuestion();}
nextBtn.onclick = ()=>{index++; loadQuestion();}
finishBtn.onclick = showResults;

function showResults(){
    questionEl.style.display="none";
    answersEl.style.display="none";
    document.getElementById("nav-container").style.display="none";

    resultsEl.style.display="block";

    // 🔥 Choix de voir le corrigé ou non
    let html = `
    <div class="btn-top">
        <button class="action-btn" onclick="goBack()">🏠 Retour aux quiz</button>
        <button class="action-btn" onclick="restartQuiz()">🔁 Recommencer</button>
    </div>

    <div style="margin:20px 0; text-align:center;">
        <p>Voulez-vous voir le corrigé détaillé ?</p>
        <button class="action-btn" onclick="renderResults(true)">✅ Oui</button>
        <button class="action-btn" onclick="renderResults(false)">❌ Non</button>
    </div>
    `;

    resultsEl.innerHTML = html;
}

function renderResults(showCorrection){
    let score = 0;
    let html = `
    <div class="btn-top">
        <button class="action-btn" onclick="goBack()">🏠 Retour aux quiz</button>
        <button class="action-btn" onclick="restartQuiz()">🔁 Recommencer</button>
    </div>
    `;

    questions.forEach((q,i)=>{
        const correct = userAnswers[i] === q.c;
        if(correct) score++;

        html += `<div class="result-item">
            <p><b>Question :</b> ${q.q}</p>
            <p><b>Ta réponse :</b> ${userAnswers[i]!==null?q.a[userAnswers[i]]:"Non répondu"}</p>
            <p><b>${correct?"✅ Correct":"❌ Incorrect"}</b></p>`;

        if(showCorrection){
            html += `<p><b>Explication :</b> ${q.e}</p>`;
            if(!correct && userAnswers[i]!==null){
                html += `<p><b>Bonne réponse :</b> ${q.a[q.c]}</p>`;
            }
        }

        html += `</div>`;
    });

    resultsEl.innerHTML = `<h2>Score : ${score}/${questions.length}</h2>` + html;
}

function restartQuiz(){
    index=0;
    userAnswers=Array(questions.length).fill(null);

    questionEl.style.display="block";
    answersEl.style.display="block";
    document.getElementById("nav-container").style.display="flex";
    resultsEl.style.display="none";

    loadQuestion();
}

function goBack(){
    window.location.href="apprendre.html";
}

loadQuestion();
</script>

</body>
</html>
