<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identifier les Menaces - Quiz</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">

<style>
body {
    margin: 0;
    font-family: Poppins, sans-serif;
    background: #0a0f24;
    color: white;
}

.quiz-container {
    max-width: 700px;
    margin: 40px auto;
    background: #111833;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

#progress {
    margin-bottom: 15px;
    opacity: 0.8;
}

.question {
    font-size: 1.4rem;
    margin-bottom: 20px;
}

.btn-answer {
    display: block;
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #16204a;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
}

.btn-answer:hover { background: #1f2a66; }
.btn-answer.selected { background: #3f6cf3; }

#nav-container {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

#nav-container button {
    padding: 12px 20px;
    background: #3f6cf3;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#nav-container button:hover { background: #5b82ff; }

#results {
    margin-top: 20px;
    background: #0d1330;
    padding: 20px;
    border-radius: 10px;
    display: none;
}

.result-item {
    background: #1c2347;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.restart-btn {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    background: #3f6cf3;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
}

.restart-btn:hover { background: #5b82ff; }
</style>
</head>

<body>

<div class="quiz-container">
    <div id="progress"></div>
    <div id="question" class="question"></div>
    <div id="answers"></div>

    <div id="nav-container">
        <button id="prev-btn">Précédent</button>
        <button id="next-btn">Suivant</button>
        <button id="finish-btn">Terminer</button>
    </div>

    <div id="results"></div>
</div>

<script>
const questions = [
{question:"Un email urgent demande vos infos ?",answers:["Répondre","Vérifier l’expéditeur","Cliquer vite"],correct:1,explanation:"Toujours vérifier l’origine."},
{question:"Un site frauduleux ?",answers:["HTTPS absent","Design beau","Logo connu"],correct:0,explanation:"Pas de HTTPS = danger."},
{question:"Lien étrange d’un ami ?",answers:["Cliquer","Vérifier avec lui","Partager"],correct:1,explanation:"Compte peut être piraté."},
{question:"Phishing ?",answers:["Message urgent","Message long","Message drôle"],correct:0,explanation:"Urgence = manipulation."},
{question:"Téléchargement inconnu ?",answers:["Sans risque","Virus possible","Améliore PC"],correct:1,explanation:"Risque malware."},
{question:"Cadeau gratuit ?",answers:["Fiable","Arnaque probable","Normal"],correct:1,explanation:"Trop beau = suspect."},
{question:"Clé USB trouvée ?",answers:["Brancher","Donner à IT","Garder"],correct:1,explanation:"Peut contenir malware."},
{question:"Fichier .exe inconnu ?",answers:["Ouvrir","Dangereux","Ignorer antivirus"],correct:1,explanation:"Peut installer virus."},
{question:"SMS banque ?",answers:["Cliquer","Supprimer","Répondre"],correct:1,explanation:"Phishing SMS courant."},
{question:"Wi-Fi public ?",answers:["Sûr","Risque","Ultra sécurisé"],correct:1,explanation:"Interception possible."},
{question:"Mot de passe ?",answers:["123456","Complexe","Identique partout"],correct:1,explanation:"Complexité = sécurité."},
{question:"Mise à jour ?",answers:["Inutile","Corrige failles","Ralentit"],correct:1,explanation:"Essentiel sécurité."},
{question:"Site demande carte ?",answers:["Donner","Quitter","Envoyer photo"],correct:1,explanation:"Arnaque probable."},
{question:"Pop-up étrange ?",answers:["Normal","Virus possible","Ignorer"],correct:1,explanation:"Signe infection."},
{question:"Antivirus ?",answers:["Inutile","Protège","Ralentit seulement"],correct:1,explanation:"Protection essentielle."}
];

let index = 0;
let userAnswers = Array(questions.length).fill(null);

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const progressEl = document.getElementById("progress");
const prevBtn = document.getElementById("prev-btn");
const nextBtn = document.getElementById("next-btn");
const finishBtn = document.getElementById("finish-btn");
const resultsEl = document.getElementById("results");

function loadQuestion() {
    const q = questions[index];
    progressEl.textContent = `Question ${index + 1} / ${questions.length}`;
    questionEl.textContent = q.question;
    answersEl.innerHTML = "";

    q.answers.forEach((ans, i) => {
        const btn = document.createElement("button");
        btn.className = "btn-answer";
        btn.textContent = ans;

        if (userAnswers[index] === i) btn.classList.add("selected");

        btn.onclick = () => {
            userAnswers[index] = i;
            loadQuestion();
        };

        answersEl.appendChild(btn);
    });

    prevBtn.style.display = index === 0 ? "none" : "inline-block";
    nextBtn.style.display = index === questions.length - 1 ? "none" : "inline-block";
    finishBtn.style.display = index === questions.length - 1 ? "inline-block" : "none";
}

prevBtn.onclick = () => { index--; loadQuestion(); };
nextBtn.onclick = () => { index++; loadQuestion(); };
finishBtn.onclick = showResults;

function showResults() {
    questionEl.style.display = "none";
    answersEl.style.display = "none";
    document.getElementById("nav-container").style.display = "none";

    resultsEl.style.display = "block";

    let score = 0;
    let html = "";

    questions.forEach((q, i) => {
        const correct = userAnswers[i] === q.correct;
        if (correct) score++;

        html += `
        <div class="result-item">
            <p><b>Question :</b> ${q.question}</p>
            <p><b>Ta réponse :</b> ${userAnswers[i] !== null ? q.answers[userAnswers[i]] : "Non répondu"}</p>
            <p><b>${correct ? "✅ Correct" : "❌ Incorrect"}</b></p>
            <p><b>Explication :</b> ${q.explanation}</p>
            ${!correct && userAnswers[i] !== null ? `<p><b>Bonne réponse :</b> ${q.answers[q.correct]}</p>` : ""}
        </div>`;
    });

    resultsEl.innerHTML = `<h2>Score : ${score} / ${questions.length}</h2>` + html;

    // bouton recommencer
    const restartBtn = document.createElement("button");
    restartBtn.textContent = "🔁 Recommencer le quiz";
    restartBtn.className = "restart-btn";
    restartBtn.onclick = restartQuiz;

    resultsEl.appendChild(restartBtn);
}

function restartQuiz() {
    index = 0;
    userAnswers = Array(questions.length).fill(null);

    questionEl.style.display = "block";
    answersEl.style.display = "block";
    document.getElementById("nav-container").style.display = "flex";
    resultsEl.style.display = "none";

    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
