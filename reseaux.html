<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Quiz Réseaux Sociaux - CyberQuiz</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">

<style>
  :root{
    --bg:#0a0f24;
    --card:#111833;
    --accent:#00bfff;
    --accent-2:#4cc9f0;
    --glass: rgba(13,19,43,0.9);
    --muted: rgba(255,255,255,0.75);
    --success: #7efc6a;
  }

  body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:white;
    overflow-x:hidden;
  }

  /* NAVBAR */
  .navbar{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(10,15,36,0.85);
    backdrop-filter:blur(6px);
    border-bottom:2px solid var(--accent);
    padding:12px 25px;
    display:flex;
    align-items:center;
    gap:12px;
    z-index:999;
  }
  .nav-logo{
    font-size:1.2rem;
    font-weight:600;
    color:var(--accent);
  }
  .back-quiz{
    background:transparent;
    border:none;
    color:var(--accent);
    font-size:1rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
  }

  /* LAYOUT */
  main{
    padding:100px 20px 60px;
    max-width:900px;
    margin:auto;
  }

  .quiz-card{
    background:linear-gradient(180deg,rgba(17,24,51,0.95),rgba(13,19,43,0.85));
    border:1px solid rgba(0,191,255,0.12);
    border-radius:14px;
    padding:28px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
  }

  .quiz-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }

  .quiz-title{
    font-size:1.4rem;
    color:var(--accent);
    margin:0;
  }

  /* BARRE DE PROGRESSION ANIMÉE */
  .progress{
    height:10px;
    background:rgba(255,255,255,0.06);
    border-radius:999px;
    overflow:hidden;
    flex:1;
    margin-left:16px;
    position:relative;
  }

  .progress i{
    display:block;
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    transition:width .45s cubic-bezier(.2,.9,.3,1);
    box-shadow:0 0 12px var(--accent);
    animation:pulse 2s infinite ease-in-out;
  }

  @keyframes pulse{
    0%{ box-shadow:0 0 6px var(--accent); }
    50%{ box-shadow:0 0 16px var(--accent-2); }
    100%{ box-shadow:0 0 6px var(--accent); }
  }

  /* QUESTIONS */
  .question{
    font-size:1.15rem;
    margin:18px 0;
    color:var(--muted);
  }

  .answers{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .answer-btn{
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(0,191,255,0.08);
    color:white;
    padding:12px 14px;
    border-radius:10px;
    text-align:left;
    cursor:pointer;
    transition:0.2s;
  }

  .answer-btn:hover{
    transform:translateY(-3px);
    background:rgba(22,32,74,0.95);
  }

  .answer-btn.selected{
    background:var(--accent);
    color:#001;
    border-color:var(--accent-2);
    box-shadow:0 6px 18px rgba(0,191,255,0.25);
  }

  .controls{
    display:flex;
    gap:12px;
    margin-top:20px;
  }

  .btn{
    padding:12px 16px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:600;
  }

  .btn-primary{
    background:var(--accent);
    color:#001;
    flex:1;
  }

  .btn-ghost{
    background:transparent;
    border:1px solid rgba(255,255,255,0.06);
    color:var(--muted);
  }

  /* RESULTATS */
  .result{
    text-align:center;
    padding:18px 10px;
  }

  .score{
    font-size:2.6rem;
    color:var(--accent);
    margin:6px 0;
  }

  .result-actions{
    display:flex;
    gap:12px;
    justify-content:center;
    margin-top:14px;
    flex-wrap:wrap;
  }

  /* CORRECTIONS */
  .correction-item{
    background:rgba(255,255,255,0.03);
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
  }

  .correct{ color:var(--success); font-weight:700; }
  .wrong{ color:#ff7b7b; font-weight:700; }

  /* MODAL */
  .modal-backdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1200;
    opacity:0;
    transition:opacity 240ms ease;
  }

  .modal-backdrop.show{ opacity:1; }

  .modal{
    background:linear-gradient(180deg,#0b1228,#071028);
    padding:18px;
    border-radius:12px;
    border:1px solid rgba(0,191,255,0.08);
    width:320px;
    text-align:center;
    transform:scale(.96);
    opacity:0;
    transition:transform 260ms cubic-bezier(.2,.9,.3,1), opacity 220ms ease;
  }

  .modal.show{
    transform:scale(1);
    opacity:1;
  }

  /* RESPONSIVE */
  @media(max-width:600px){
    .quiz-card{ padding:18px; }
    .quiz-title{ font-size:1.05rem; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <button class="back-quiz" id="backBtn"><i class="fa-solid fa-arrow-left"></i> Retour</button>
  <div class="nav-logo">CyberQuiz</div>
</nav>

<!-- PARTICULES -->
<canvas id="particles" style="position:fixed;inset:0;z-index:-1;"></canvas>

<main>
  <div class="quiz-card">

    <div class="quiz-header">
      <h2 class="quiz-title">Quiz — Réseaux Sociaux</h2>
      <div class="progress"><i id="progressBar"></i></div>
    </div>

    <div id="quizStep">
      <div class="question" id="questionText"></div>
      <div class="answers" id="answersBox"></div>

      <div class="controls">
        <button class="btn btn-ghost" id="prevBtn" disabled>Précédent</button>
        <button class="btn btn-primary" id="nextBtn" disabled>Suivant</button>
      </div>
    </div>

    <div id="resultStep" style="display:none;">
      <div class="result">
        <div>Votre score</div>
        <div class="score" id="scoreText"></div>
        <div class="result-actions">
          <button class="btn btn-ghost" id="showCorrectionBtn">Voir la correction détaillée</button>
          <button class="btn btn-primary" id="goHomeBtn">Retour à l’accueil</button>
        </div>
      </div>
    </div>

    <div id="correctionStep" style="display:none;">
      <h3 style="color:var(--accent)">Correction détaillée</h3>
      <div id="correctionList"></div>
      <div style="display:flex;gap:12px;margin-top:14px;">
        <button class="btn btn-ghost" id="backToResultBtn">Retour au score</button>
        <button class="btn btn-primary" id="goHomeBtn2">Retour à l’accueil</button>
      </div>
    </div>

  </div>
</main>

<!-- MODAL -->
<div id="confirmModal" style="display:none;">
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h4 style="color:var(--accent);margin:0">Quitter le quiz ?</h4>
      <p>Votre progression sera perdue.</p>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px;">
        <button class="btn btn-ghost" id="cancelQuit">Rester</button>
        <button class="btn btn-primary" id="confirmQuit">Quitter</button>
      </div>
    </div>
  </div>
</div>

<script>
/* PARTICULES PLUS VISIBLES */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particlesArray = [];

function initCanvas(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}

window.addEventListener('resize', () => {
  initCanvas();
  initParticles();
});

class Particle{
  constructor(){
    this.reset();
    this.size = Math.random()*3.5 + 1.2;
    this.color = `rgba(0,191,255,${Math.random()*0.55+0.35})`;
  }
  reset(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.speedX = (Math.random()-0.5)*0.6;
    this.speedY = (Math.random()-0.5)*0.6;
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    if(this.x<-10 || this.x>canvas.width+10 || this.y<-10 || this.y>canvas.height+10){
      this.reset();
    }
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = this.color;
    ctx.fill();
  }
}

function initParticles(){
  particlesArray = [];
  const number = Math.max(40, Math.floor((canvas.width*canvas.height)/15000));
  for(let i=0;i<number;i++) particlesArray.push(new Particle());
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p=>{ p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}

initCanvas();
initParticles();
animateParticles();

/* QUIZ */
const questions = [
  {
    q:"Quel est le risque principal lorsqu’on partage trop d’informations personnelles ?",
    answers:["Perdre des abonnés","Usurpation d'identité","Recevoir plus de messages","Améliorer sa visibilité"],
    correct:1,
    explanation:"Les informations publiques peuvent être utilisées pour usurper votre identité."
  },
  {
    q:"Quelle pratique réduit le risque d'accès non autorisé ?",
    answers:["Même mot de passe partout","Activer la double authentification","Partager son mot de passe","Mot de passe court"],
    correct:1,
    explanation:"La double authentification ajoute une sécurité essentielle."
  },
  {
    q:"Avant de cliquer sur un lien reçu en message privé, il faut :",
    answers:["Cliquer immédiatement","Vérifier l'URL et l'expéditeur","Répondre pour demander","Partager le lien"],
    correct:1,
    explanation:"Vérifier l'expéditeur permet d'éviter le phishing."
  },
  {
    q:"Quel indice peut indiquer un faux profil ?",
    answers:["Photos cohérentes","Peu d'amis + publications suspectes","Bio détaillée","Compte vérifié"],
    correct:1,
    explanation:"Les faux profils ont souvent peu d'interactions."
  },
  {
    q:"Pourquoi limiter la visibilité de vos publications ?",
    answers:["Pour plus de likes","Pour protéger vos données","Pour être vu par tous","Pour gagner des abonnés"],
    correct:1,
    explanation:"Limiter la visibilité réduit l'exposition de données sensibles."
  }
];

let current = 0;
let score = 0;
let selected = null;
const total = questions.length;
const userSelections = new Array(total).fill(null);

const questionText = document.getElementById('questionText');
const answersBox = document.getElementById('answersBox');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');
const progressBar = document.getElementById('progressBar');

const quizStep = document.getElementById('quizStep');
const resultStep = document.getElementById('resultStep');
const correctionStep = document.getElementById('correctionStep');

const scoreText = document.getElementById('scoreText');
const correctionList = document.getElementById('correctionList');

function updateProgress(){
  progressBar.style.width = Math.round((current)/total*100) + "%";
}

function renderQuestion(){
  const q = questions[current];
  questionText.textContent = `Question ${current+1}/${total} — ${q.q}`;
  answersBox.innerHTML = "";
  nextBtn.disabled = true;
  prevBtn.disabled = current === 0;

  q.answers.forEach((a,idx)=>{
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.textContent = a;
    btn.onclick = ()=>{
      document.querySelectorAll(".answer-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = idx;
      userSelections[current] = idx;
      nextBtn.disabled = false;
    };
    if(userSelections[current] === idx){
      btn.classList.add("selected");
      nextBtn.disabled = false;
    }
    answersBox.appendChild(btn);
  });

  updateProgress();
}

nextBtn.onclick = ()=>{
  if(current < total-1){
    current++;
    selected = null;
    renderQuestion();
  } else {
    computeScore();
    showResults();
  }
};

prevBtn.onclick = ()=>{
  if(current > 0){
    current--;
    selected = null;
    renderQuestion();
  }
};

function computeScore(){
  score = 0;
  for(let i=0;i<total;i++){
    if(userSelections[i] === questions[i].correct) score++;
  }
}

function showResults(){
  quizStep.style.display = "none";
  resultStep.style.display = "block";
  scoreText.textContent = `${score} / ${total}`;
  progressBar.style.width = "100%";
}

document.getElementById("showCorrectionBtn").onclick = ()=>{
  resultStep.style.display = "none";
  correctionStep.style.display = "block";
  correctionList.innerHTML = "";

  questions.forEach((q,i)=>{
    const div = document.createElement("div");
    div.className = "correction-item";
    const user = userSelections[i] === null ? "Aucune réponse" : q.answers[userSelections[i]];
    const correct = q.answers[q.correct];
    const ok = userSelections[i] === q.correct;

    div.innerHTML = `
      <strong>Question ${i+1}</strong>
      <p style="color:var(--muted)">${q.q}</p>
      <p><strong>Votre réponse :</strong> ${user}</p>
      <p><strong>Bonne réponse :</strong> ${correct}</p>
      <p class="${ok ? 'correct':'wrong'}">${ok ? 'Correct':'Incorrect'}</p>
      <p style="color:var(--muted)">${q.explanation}</p>
    `;
    correctionList.appendChild(div);
  });
};

document.getElementById("backToResultBtn").onclick = ()=>{
  correctionStep.style.display = "none";
  resultStep.style.display = "block";
};

document.getElementById("goHomeBtn").onclick =
document.getElementById("goHomeBtn2").onclick = ()=>{
  window.location.href = "accueil.html";
};

/* MODAL RETOUR */
backBtn.onclick = ()=>{
  const modal = document.getElementById("confirmModal");
  const backdrop = document.getElementById("modalBackdrop");
  const box = backdrop.querySelector(".modal");

  modal.style.display = "block";
  requestAnimationFrame(()=>{
    backdrop.classList.add("show");
    box.classList.add("show");
  });
};

document.getElementById("cancelQuit").onclick = ()=>{
  const backdrop = document.getElementById("modalBackdrop");
  const
