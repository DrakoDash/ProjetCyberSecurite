<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Quiz Réseaux Sociaux - CyberQuiz</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">

<style>
  :root{
    --bg:#0a0f24;
    --card:#111833;
    --accent:#00bfff;
    --accent-2:#4cc9f0;
    --card-hover:#16204a;
    --glass: rgba(13,19,43,0.9);
    --muted: rgba(255,255,255,0.75);
    --success: #7efc6a;
  }

  html,body{height:100%;margin:0;font-family:'Poppins',sans-serif;background:var(--bg);color:#fff}
  .navbar {
    position: fixed; top: 0; width: 100%; background: rgba(10,15,36,0.85);
    backdrop-filter: blur(6px); border-bottom: 2px solid var(--accent);
    padding: 12px 25px; display:flex; align-items:center; gap:12px; z-index:999;
  }
  .nav-logo { font-size:1.2rem; font-weight:600; color:var(--accent); letter-spacing:1px; }
  .back-quiz {
    background: transparent; border: none; color: var(--accent); font-size:1rem;
    cursor:pointer; display:flex; align-items:center; gap:8px;
  }

  main { padding: 100px 20px 60px; max-width:900px; margin:0 auto; }
  .quiz-card {
    background: linear-gradient(180deg, rgba(17,24,51,0.95), rgba(13,19,43,0.85));
    border: 1px solid rgba(0,191,255,0.12);
    border-radius: 14px; padding: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }

  .quiz-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
  .quiz-title { font-size:1.4rem; color:var(--accent); margin:0; }
  .progress {
    height:10px; background: rgba(255,255,255,0.06); border-radius:999px; overflow:hidden; flex:1; margin-left:16px;
  }
  .progress > i { display:block; height:100%; width:0%; background: linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .35s ease; }

  .question { font-size:1.15rem; margin: 18px 0; color:var(--muted); }
  .answers { display:flex; flex-direction:column; gap:12px; margin-top:8px; }
  .answer-btn {
    background: rgba(0,0,0,0.45); border:1px solid rgba(0,191,255,0.08); color:#fff;
    padding:12px 14px; border-radius:10px; text-align:left; cursor:pointer; transition: transform .12s ease, background .12s ease;
  }
  .answer-btn:hover { transform: translateY(-3px); background: rgba(22,32,74,0.95); }
  .answer-btn.selected { background: var(--accent); color:#001; border-color: var(--accent-2); box-shadow: 0 6px 18px rgba(0,191,255,0.12); }

  .controls { display:flex; gap:12px; margin-top:20px; }
  .btn {
    padding:12px 16px; border-radius:10px; border:none; cursor:pointer; font-weight:600;
  }
  .btn-primary { background:var(--accent); color:#001; flex:1; }
  .btn-ghost { background:transparent; border:1px solid rgba(255,255,255,0.06); color:var(--muted); }

  .result { text-align:center; padding:18px 10px; }
  .score { font-size:2.6rem; color:var(--accent); margin:6px 0; }
  .result-actions { display:flex; gap:12px; justify-content:center; margin-top:14px; flex-wrap:wrap; }

  .correction-item { background: rgba(255,255,255,0.03); padding:12px; border-radius:10px; margin-bottom:10px; }
  .correct { color: var(--success); font-weight:700; }
  .wrong { color: #ff7b7b; font-weight:700; }

  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:1200; opacity:0; transition: opacity 240ms ease; }
  .modal-backdrop.show { opacity:1; }
  .modal { background: linear-gradient(180deg, #0b1228, #071028); padding:18px; border-radius:12px; border:1px solid rgba(0,191,255,0.08); width:320px; text-align:center; transform: scale(.96); opacity:0; transition: transform 260ms cubic-bezier(.2,.9,.3,1), opacity 220ms ease; }
  .modal.show { transform: scale(1); opacity:1; }
  .modal p { margin:12px 0; color:var(--muted); }

  /* Animations between questions */
  .quiz-card .content-wrap {
    position: relative;
    overflow: hidden;
    min-height: 220px;
  }
  .q-panel {
    position: relative;
    transition: transform 360ms cubic-bezier(.2,.9,.3,1), opacity 260ms ease;
    will-change: transform, opacity;
  }
  .q-enter { transform: translateX(18px); opacity: 0; }
  .q-enter.q-enter-active { transform: translateX(0); opacity: 1; }
  .q-exit { transform: translateX(0); opacity: 1; }
  .q-exit.q-exit-active { transform: translateX(-18px); opacity: 0; }

  @media (max-width:600px) {
    .quiz-card { padding:18px; }
    .quiz-title { font-size:1.05rem; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <button class="back-quiz" id="backBtn" aria-label="Retour à l'accueil"><i class="fa-solid fa-arrow-left"></i> Retour</button>
  <div class="nav-logo">CyberQuiz</div>
</nav>

<canvas id="particles" style="position:fixed;inset:0;z-index:-1;"></canvas>

<main>
  <div class="quiz-card" id="quizCard" role="application" aria-labelledby="quizTitle">
    <div class="quiz-header">
      <h2 id="quizTitle" class="quiz-title">Quiz — Réseaux Sociaux</h2>
      <div class="progress" aria-hidden="true"><i id="progressBar"></i></div>
    </div>

    <div class="content-wrap" id="contentWrap">
      <div id="quizStep" class="q-panel">
        <div class="question" id="questionText">Question texte</div>
        <div class="answers" id="answersBox" role="list"></div>
        <div class="controls">
          <button class="btn btn-ghost" id="prevBtn" disabled>Précédent</button>
          <button class="btn btn-primary" id="nextBtn" disabled>Suivant</button>
        </div>
      </div>

      <div id="resultStep" class="q-panel" style="display:none;">
        <div class="result">
          <div>Votre score</div>
          <div class="score" id="scoreText">0 / 5</div>
          <div class="result-actions">
            <button class="btn btn-ghost" id="showCorrectionBtn">Voir la correction détaillée</button>
            <button class="btn btn-primary" id="goHomeBtn">Retour à l’accueil</button>
          </div>
        </div>
      </div>

      <div id="correctionStep" class="q-panel" style="display:none;">
        <h3 style="margin-top:0;color:var(--accent)">Correction détaillée</h3>
        <div id="correctionList" style="margin-top:12px"></div>
        <div style="display:flex;gap:12px;margin-top:14px;">
          <button class="btn btn-ghost" id="backToResultBtn">Retour au score</button>
          <button class="btn btn-primary" id="goHomeBtn2">Retour à l’accueil</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Modal confirmation -->
<div id="confirmModal" style="display:none;">
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h4 id="modalTitle" style="color:var(--accent);margin:0">Quitter le quiz ?</h4>
      <p>Si vous quittez, votre progression sera perdue. Voulez-vous vraiment quitter ?</p>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px;">
        <button class="btn btn-ghost" id="cancelQuit">Rester</button>
        <button class="btn btn-primary" id="confirmQuit">Quitter</button>
      </div>
    </div>
  </div>
</div>

<script>
/* Particules (léger, réutilisation) */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particlesArray = [];
function initCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.addEventListener('resize', () => { initCanvas(); initParticles(); });
class Particle {
  constructor() { this.reset(); this.size = Math.random()*2.5+0.6; this.color = `rgba(0,191,255,${Math.random()*0.45+0.12})`; }
  reset(){ this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.speedX=(Math.random()-0.5)*0.6; this.speedY=(Math.random()-0.5)*0.6; }
  update(){ this.x+=this.speedX; this.y+=this.speedY; if(this.x<-10||this.x>canvas.width+10||this.y<-10||this.y>canvas.height+10) this.reset(); }
  draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle=this.color; ctx.fill(); }
}
function initParticles(){ particlesArray=[]; const number = Math.max(20, Math.floor((canvas.width*canvas.height)/22000)); for(let i=0;i<number;i++) particlesArray.push(new Particle()); }
function animateParticles(){ ctx.clearRect(0,0,canvas.width,canvas.height); particlesArray.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animateParticles); }
initCanvas(); initParticles(); animateParticles();

/* Quiz data */
const questions = [
  {
    q: "Quel est le risque principal lorsqu’on partage trop d’informations personnelles sur un profil public ?",
    answers: ["Perdre des abonnés","Usurpation d'identité","Recevoir plus de messages","Améliorer sa visibilité"],
    correct: 1,
    explanation: "Les informations publiques peuvent être utilisées pour usurper votre identité ou faciliter des attaques ciblées."
  },
  {
    q: "Quelle pratique réduit le risque d'accès non autorisé à votre compte ?",
    answers: ["Utiliser le même mot de passe partout","Activer la double authentification","Partager le mot de passe avec un ami","Utiliser un mot de passe court"],
    correct: 1,
    explanation: "La double authentification ajoute une seconde vérification, rendant l'accès plus difficile pour un attaquant."
  },
  {
    q: "Avant de cliquer sur un lien reçu en message privé, que faire ?",
    answers: ["Cliquer immédiatement","Vérifier l'URL et l'expéditeur","Répondre pour demander plus d'infos","Partager le lien"],
    correct: 1,
    explanation: "Vérifier l'URL et l'expéditeur permet d'identifier les tentatives de phishing."
  },
  {
    q: "Quel indice peut indiquer qu'un compte est un faux profil ?",
    answers: ["Photos cohérentes et nombreuses","Peu d'amis et publications récentes suspectes","Nom complet et bio détaillée","Compte vérifié"],
    correct: 1,
    explanation: "Les faux profils ont souvent peu d'interactions et des publications copiées ou incohérentes."
  },
  {
    q: "Pourquoi limiter la visibilité de vos publications à vos amis ?",
    answers: ["Pour augmenter les likes","Pour protéger vos données personnelles","Pour que tout le monde voie vos posts","Pour gagner des abonnés"],
    correct: 1,
    explanation: "Limiter la visibilité réduit l'exposition de données personnelles exploitables."
  }
];

let current = 0;
let score = 0;
let selected = null;
const total = questions.length;
const userSelections = new Array(total).fill(null);

/* DOM */
const questionText = document.getElementById('questionText');
const answersBox = document.getElementById('answersBox');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');
const progressBar = document.getElementById('progressBar');

const quizStep = document.getElementById('quizStep');
const resultStep = document.getElementById('resultStep');
const correctionStep = document.getElementById('correctionStep');

const scoreText = document.getElementById('scoreText');
const correctionList = document.getElementById('correctionList');

const showCorrectionBtn = document.getElementById('showCorrectionBtn');
const goHomeBtn = document.getElementById('goHomeBtn');
const goHomeBtn2 = document.getElementById('goHomeBtn2');
const backToResultBtn = document.getElementById('backToResultBtn');

const backBtn = document.getElementById('backBtn');
const contentWrap = document.getElementById('contentWrap');

let animating = false;

function updateProgress() {
  const pct = Math.round((current) / total * 100);
  progressBar.style.width = pct + '%';
}

function renderQuestion() {
  const q = questions[current];
  questionText.textContent = `Question ${current+1} / ${total} — ${q.q}`;
  answersBox.innerHTML = '';
  nextBtn.disabled = true;
  prevBtn.disabled = current === 0;

  q.answers.forEach((a, idx) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.type = 'button';
    btn.textContent = a;
    btn.setAttribute('data-index', idx);
    btn.onclick = () => {
      document.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selected = idx;
      userSelections[current] = idx;
      nextBtn.disabled = false;
    };
    if (userSelections[current] === idx) {
      btn.classList.add('selected');
      selected = idx;
      nextBtn.disabled = false;
    }
    answersBox.appendChild(btn);
  });

  updateProgress();
}

/* Helper: animate panel swap (fromEl -> toEl) */
function animatePanel(fromEl, toEl) {
  return new Promise(resolve => {
    if (animating) { resolve(); return; }
    animating = true;

    fromEl.classList.remove('q-enter','q-enter-active');
    fromEl.classList.add('q-exit');
    void fromEl.offsetWidth;
    fromEl.classList.add('q-exit-active');

    const onFromEnd = (e) => {
      if (e.target !== fromEl) return;
      fromEl.removeEventListener('transitionend', onFromEnd);
      fromEl.style.display = 'none';
      fromEl.classList.remove('q-exit','q-exit-active');

      toEl.style.display = '';
      toEl.classList.add('q-enter');
      void toEl.offsetWidth;
      toEl.classList.add('q-enter-active');

      const onToEnd = (ev) => {
        if (ev.target !== toEl) return;
        toEl.removeEventListener('transitionend', onToEnd);
        toEl.classList.remove('q-enter','q-enter-active');
        animating = false;
        resolve();
      };
      toEl.addEventListener('transitionend', onToEnd);
    };

    fromEl.addEventListener('transitionend', onFromEnd);
  });
}

/* Navigation with animated transitions */
nextBtn.addEventListener('click', () => {
  if (animating) return;
  if (current < total - 1) {
    const panel = quizStep;
    const clone = panel.cloneNode(true);
    clone.id = 'tempClone';
    contentWrap.appendChild(clone);
    // animate clone exit
    clone.classList.add('q-exit','q-exit-active');
    clone.addEventListener('transitionend', () => {
      clone.remove();
      current++;
      selected = null;
      renderQuestion();
      panel.classList.add('q-enter');
      void panel.offsetWidth;
      panel.classList.add('q-enter-active');
      panel.addEventListener('transitionend', function handler(e) {
        if (e.target !== panel) return;
        panel.removeEventListener('transitionend', handler);
        panel.classList.remove('q-enter','q-enter-active');
      });
    }, { once: true });
  } else {
    computeScore();
    animatePanel(quizStep, resultStep).then(() => {
      scoreText.textContent = `${score} / ${total}`;
      progressBar.style.width = '100%';
    });
  }
});

prevBtn.addEventListener('click', () => {
  if (animating) return;
  if (current > 0) {
    const panel = quizStep;
    const clone = panel.cloneNode(true);
    clone.id = 'tempClone';
    contentWrap.appendChild(clone);
    clone.classList.add('q-exit','q-exit-active');
    clone.addEventListener('transitionend', () => {
      clone.remove();
      current--;
      selected = null;
      renderQuestion();
      panel.classList.add('q-enter');
      void panel.offsetWidth;
      panel.classList.add('q-enter-active');
      panel.addEventListener('transitionend', function handler(e) {
        if (e.target !== panel) return;
        panel.removeEventListener('transitionend', handler);
        panel.classList.remove('q-enter','q-enter-active');
      });
    }, { once: true });
  }
});

function computeScore() {
  score = 0;
  for (let i = 0; i < total; i++) {
    if (userSelections[i] === questions[i].correct) score++;
  }
}

/* Show results without corrections */
function showResults() {
  quizStep.style.display = 'none';
  correctionStep.style.display = 'none';
  resultStep.style.display = 'block';
  scoreText.textContent = `${score} / ${total}`;
  progressBar.style.width = '100%';
}

/* Show correction with animation */
showCorrectionBtn.addEventListener('click', () => {
  animatePanel(resultStep, correctionStep).then(() => {
    correctionList.innerHTML = '';
    questions.forEach((q, i) => {
      const div = document.createElement('div');
      div.className = 'correction-item';
      const user = userSelections[i] === null ? 'Aucune réponse' : q.answers[userSelections[i]];
      const correct = q.answers[q.correct];
      const isOk = userSelections[i] === q.correct;
      div.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <strong>Question ${i+1}</strong>
          <span class="${isOk ? 'correct' : 'wrong'}">${isOk ? 'Correct' : 'Incorrect'}</span>
        </div>
        <p style="margin:8px 0;color:var(--muted)">${q.q}</p>
        <p style="margin:6px 0"><strong>Votre réponse :</strong> ${user}</p>
        <p style="margin:6px 0"><strong>Bonne réponse :</strong> ${correct}</p>
        <p style="margin:6px 0;color:var(--muted)">${q.explanation}</p>
      `;
      correctionList.appendChild(div);
    });
  });
});

/* Back to result */
backToResultBtn.addEventListener('click', () => {
  animatePanel(correctionStep, resultStep);
});

/* Go home */
function goHome() { window.location.href = 'accueil.html'; }
goHomeBtn.addEventListener('click', goHome);
goHomeBtn2.addEventListener('click', goHome);

/* Back button with animated modal */
backBtn.addEventListener('click', () => {
  const confirmModal = document.getElementById('confirmModal');
  const modalBackdrop = document.getElementById('modalBackdrop');
  const modal = modalBackdrop.querySelector('.modal');
  confirmModal.style.display = 'block';
  requestAnimationFrame(() => {
    modalBackdrop.classList.add('show');
    modal.classList.add('show');
  });
});

document.getElementById('cancelQuit').addEventListener('click', () => {
  const modalBackdrop = document.getElementById('modalBackdrop');
  const modal = modalBackdrop.querySelector('.modal');
  modal.classList.remove('show');
  modalBackdrop.classList.remove('show');
  modalBackdrop.addEventListener('transitionend', function h() {
    modalBackdrop.removeEventListener('transitionend', h);
    document.getElementById('confirmModal').style.display = 'none';
  });
});

document.getElementById('confirmQuit').addEventListener('click', () => {
  window.location.href = 'accueil.html';
});

/* Keyboard accessibility */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !nextBtn.disabled) nextBtn.click();
});

/* Init */
renderQuestion();
updateProgress();
</script>
</body>
</html>
